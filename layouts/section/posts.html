{{ define "main" }} {{.Content}}
<div style="display: grid; grid-auto-flow: row; gap: 0.5rem" class="all-posts">
  <h2>All posts</h2>
  {{ $sorted := sort .Site.RegularPages "Title" "asc" }} {{range $sorted}}
  <a style="text-align: left" href="{{.Permalink}}">{{.Title}}</a>
  {{end}}
</div>
{{ end }}
